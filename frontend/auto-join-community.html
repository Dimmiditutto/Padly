<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Join Community</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(6, 182, 212, 0.18), transparent 32%),
          linear-gradient(180deg, #e0f2fe 0%, #f8fafc 46%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        width: min(92vw, 560px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
        border: 1px solid rgba(14, 116, 144, 0.16);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.9rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #ecfeff;
        color: #155e75;
      }

      .status.error {
        background: #fef2f2;
        color: #991b1b;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .primary {
        background: #0891b2;
        color: white;
      }

      .secondary {
        border: 1px solid #cbd5e1;
        color: #0f172a;
        background: white;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ingresso community in corso</h1>
      <p id="description">Sto completando l'accesso alla community del club e poi apro direttamente la bacheca play.</p>
      <div id="status" class="status">Invio richiesta al backend locale…</div>
      <div class="actions">
        <a id="play-link" class="primary" href="/">Apri la bacheca play</a>
        <a id="invite-link" class="secondary" href="/">Apri la pagina invito</a>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const club = params.get('club') || 'default-club';
      const level = params.get('level') || 'INTERMEDIATE_HIGH';
      const statusNode = document.getElementById('status');
      const playLink = document.getElementById('play-link');
      const inviteLink = document.getElementById('invite-link');
      const playPath = `/c/${encodeURIComponent(club)}/play`;
      const invitePath = token ? `/c/${encodeURIComponent(club)}/play/invite/${encodeURIComponent(token)}` : playPath;

      playLink.href = playPath;
      inviteLink.href = invitePath;

      function setStatus(message, tone) {
        statusNode.textContent = message;
        statusNode.className = tone === 'error' ? 'status error' : 'status';
      }

      async function joinCommunity() {
        if (!token) {
          setStatus('Manca il token invito. Apro la pagina play del club come fallback.', 'error');
          window.setTimeout(() => window.location.replace(playPath), 1200);
          return;
        }

        try {
          const response = await fetch(`/api/public/community-invites/${encodeURIComponent(token)}/accept?club=${encodeURIComponent(club)}`, {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({
              declared_level: level,
              privacy_accepted: true,
            }),
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error(payload.detail || payload.message || 'Non riesco a completare l ingresso community');
          }

          const playerName = payload?.player?.profile_name;
          setStatus(playerName ? `Ingresso completato per ${playerName}. Reindirizzo alla bacheca play…` : 'Ingresso completato. Reindirizzo alla bacheca play…');
          window.setTimeout(() => window.location.replace(playPath), 900);
        } catch (error) {
          const message = error instanceof Error ? error.message : 'Errore imprevisto durante l ingresso community';
          setStatus(`${message}. Se serve, puoi aprire la pagina invito manuale dal link sotto.`, 'error');
        }
      }

      joinCommunity();
    </script>
  </body>
  </html>
