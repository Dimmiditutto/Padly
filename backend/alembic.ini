[alembic]
script_location = alembic
# Questo valore viene sovrascritto da alembic/env.py tramite settings.database_url
# Non eseguire comandi alembic senza DATABASE_URL correttamente configurato nel .env
sqlalchemy.url = sqlite:///./padelbooking.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
